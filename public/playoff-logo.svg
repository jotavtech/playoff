<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>
  
  <!-- Play button circle -->
  <circle cx="256" cy="220" r="120" fill="none" stroke="url(#accent)" stroke-width="8"/>
  
  <!-- Play triangle -->
  <polygon points="226,170 226,270 306,220" fill="url(#accent)"/>
  
  <!-- Text PLAYOFF -->
  <text x="256" y="400" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="64" font-weight="900" fill="white" letter-spacing="8">PLAYOFF</text>
  
  <!-- Decorative lines -->
  <line x1="80" y1="430" x2="180" y2="430" stroke="url(#accent)" stroke-width="4"/>
  <line x1="332" y1="430" x2="432" y2="430" stroke="url(#accent)" stroke-width="4"/>
</svg>
